<!DOCTYPE html>
<html>
<head>
<title>sign up Page</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
	*{
		margin:0px;
		padding:0px;
		box-sizing:border-box;
	}

body{
    background:#e0f2fe;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
	height:100vh;
   
}

.box{
	margin:auto;
    background:white;
    width:400px;
    padding:30px;
    border-radius:20px;
   box-shadow:0px 15px 35px rgba(37,99,235,0.25);
}

.icon{
    width:70px;
    height:70px;
    background:#dbeafe;
    border-radius:50%;
    text-align:center;
    line-height:70px;
    font-size:30px;
    margin:auto;
    color:#2563eb;
	box-shadow:0px 0px 15px rgba(37,99,235,0.4);
	transition:0.3s;
}

h1{
    text-align:center;
    margin-top:15px;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:gray;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

.input-box{
    position:relative;
}

.input-box input{
    width:100%;
    height:45px;
    border:1px solid lightgray;
    border-radius:8px;
    padding-left:40px;
    padding-right:40px;
}

.input-box i{
    position:absolute;
    left:12px;
    top:15px;
    color:gray;
}

.eye{
    left:auto !important;
    right:12px;
}

.forgot{
    display:block;
    text-align:right;
    margin-top:10px;
    text-decoration:none;
    color:#4f46ff;
}

button{
    width:100%;
    height:45px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:linear-gradient(to right,#2563eb,#06b6d4);
	color:#fff;
    font-size:18px;
    cursor:pointer;
	transition:0.3s;
}
button:hover{
	background:linear-gradient(to right,#3b82f6,#22d3ee);
	transform:translateY(-5px);
	box-shadow:0px 10px 25px rgba(37,99,235,0.7);
}
input:focus{
	outline:none;
	border:2px solid #2563eb;
	box-shadow:0px 0px 10px rgba(37,99,235,0.25);
}

.line-text{
    display:flex;
    align-items:center;
    margin-top:25px;
}

.line{
    flex:1;
    height:1px;
    background:lightgray;
}

.line-text span{
    margin:0 10px;
    color:gray;
    font-size:14px;
	
}

.line-text a{
    color:#2563eb;
   line-style:none;
}

</style>
</head>

<body>

<div class="box">

    <div class="icon">
        <i class="fa-regular fa-user"></i>
    </div>

    <h1>Sign Up</h1>

    <p>Welcome back! Please sign in to continue.</p>

    <label>Email</label>

    <div class="input-box">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="Enter your email">
    </div>

    <label>Password</label>

    <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Enter your password">
        <i class="fa-solid fa-eye eye"></i>
    </div>

    <a href="#" class="forgot">Forgot Password?</a>

    <button>Sign In</button>

    <div class="line-text">

        <div class="line"></div>

        <span>
            Don't have an account?
            <a href="#">Sign Up</a>
        </span>

        <div class="line"></div>

    </div>

</div>

</body>
</html>
